<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Budžeta plānotājs</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
        }

        form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input, select, button {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .bilance {
            font-size: 22px;
            text-align: center;
            margin: 20px 0;
        }

        .plus {
            color: green;
        }

        .minus {
            color: red;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            background: #f7f7f7;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .info {
            display: flex;
            flex-direction: column;
        }

        .delete {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>💰 Budžeta plānotājs</h1>

    <form method="post" action="/pievienot">
        <input type="number" step="0.01" name="summa" placeholder="Summa (€)" required>
        <input type="text" name="apraksts" placeholder="Apraksts" required>

        <select name="tips">
            <option>Ienākums</option>
            <option>Izdevums</option>
        </select>

        <button type="submit">Pievienot</button>
    </form>

    <div class="bilance">
        Bilance:
        <span class="{{ 'plus' if bilance >= 0 else 'minus' }}">
            {{ bilance }} €
        </span>
    </div>

    <ul>
        {% for ier in dati %}
        <li>
            <div class="info">
                <strong>{{ ier[2] }}</strong>
                <small>{{ ier[3] }} | {{ ier[0] }}</small>
            </div>

            <div>
                <span class="{{ 'plus' if ier[0]=='Ienākums' else 'minus' }}">
                    {{ ier[1] }} €
                </span>
                <a class="delete" href="/dzest/{{ loop.index0 }}">✖</a>
            </div>
        </li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
